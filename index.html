<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 띵동! 이 게임은 무엇일까요? | AI 사운드 퀴즈</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      font-family: 'Malgun Gothic', Arial, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: min(700px, 92%);
      margin: 20px auto;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
      color: #4fc3f7;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .subtitle {
      text-align: center;
      color: #e0e0e0;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .user-profile {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      padding: 12px 20px;
      border-radius: 14px;
      margin-bottom: 20px;
    }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; }

    .quiz-box {
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .score-board {
      font-size: 18px;
      font-weight: bold;
      color: #ffeb3b;
      margin-bottom: 15px;
    }

    .audio-section {
      margin: 25px 0;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }

    audio { width: 100%; margin-top: 10px; }

    input[type="text"] {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 16px;
      background: rgba(0,0,0,0.5);
      color: white;
      outline: none;
      text-align: center;
      transition: 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4fc3f7;
      box-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
    }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0 24px;
      height: 46px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
    }

    button:hover { transform: translateY(-2px); opacity: 0.9; }
    button:disabled { cursor: not-allowed; opacity: 0.5; transform: none; }

    .primary-btn { background: #4fc3f7; color: #111; }
    .success-btn { background: #4caf50; color: white; }
    .auth-btn { background: #ff5722; color: white; }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: #ffca28;
      font-size: 14px;
      text-align: center;
    }

    .result-msg {
      font-size: 20px;
      font-weight: bold;
      margin-top: 15px;
    }
    .correct { color: #4caf50; }
    .wrong { color: #f44336; }

    .hidden { display: none !important; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. [필수] 본인의 Firebase 설정값으로 채워주세요!
    const firebaseConfig = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "YOUR_FIREBASE_AUTH_DOMAIN",
      projectId: "YOUR_FIREBASE_PROJECT_ID",
      storageBucket: "YOUR_FIREBASE_STORAGE_BUCKET",
      messagingSenderId: "YOUR_FIREBASE_MESSAGING_SENDER_ID",
      appId: "YOUR_FIREBASE_APP_ID"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // 2. OpenAI API Key 설정
    const OPENAI_API_KEY = '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';

    // 퀴즈용 게임 리스트
    const GAME_LIST = ["리그 오브 레전드", "오버워치", "마인크래프트", "스타크래프트", "메이플스토리", "던전앤파이터", "배틀그라운드", "발로란트", "서든어택", "로스트아크"];

    let currentUser = null;
    let currentScore = 0;
    let currentAnswer = ""; 

    // DOM 요소
    const loginSection = document.getElementById('loginSection');
    const quizSection = document.getElementById('quizSection');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userNameDisplay = document.getElementById('userName');
    const userAvatar = document.getElementById('userAvatar');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const statusBox = document.getElementById('statusBox');
    const audioPlayer = document.getElementById('audioPlayer');
    const nextBtn = document.getElementById('nextBtn');
    const answerInput = document.getElementById('answerInput');
    const submitBtn = document.getElementById('submitBtn');
    const resultBox = document.getElementById('resultBox');

    // 이벤트 바인딩
    loginBtn.addEventListener('click', () => signInWithPopup(auth, provider));
    logoutBtn.addEventListener('click', () => signOut(auth));
    nextBtn.addEventListener('click', generateNewQuiz);
    submitBtn.addEventListener('click', checkAnswer);
    answerInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') checkAnswer(); });

    // 인증 상태 체크
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        userNameDisplay.textContent = user.displayName;
        userAvatar.src = user.photoURL || 'https://via.placeholder.com/32';
        
        loginSection.classList.add('hidden');
        quizSection.classList.remove('hidden');
        
        await loadUserScore(user.uid);
        generateNewQuiz();
      } else {
        currentUser = null;
        loginSection.classList.remove('hidden');
        quizSection.classList.add('hidden');
      }
    });

    // DB에서 점수 로드
    async function loadUserScore(uid) {
      statusBox.textContent = "사용자 데이터를 불러오는 중...";
      const docRef = doc(db, "quiz_scores", uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        currentScore = docSnap.data().score || 0;
      } else {
        currentScore = 0;
      }
      scoreDisplay.textContent = currentScore;
      statusBox.textContent = "데이터 로드 완료!";
    }

    // DB에 점수 저장
    async function saveUserScore(uid, score) {
      await setDoc(doc(db, "quiz_scores", uid), {
        username: currentUser.displayName,
        score: score,
        updatedAt: new Date()
      }, { merge: true });
    }

    // 🚀 새로운 퀴즈 생성 (OpenAI 직통 버전)
    async function generateNewQuiz() {
      if (!currentUser) return;
      
      answerInput.value = "";
      answerInput.disabled = false;
      submitBtn.disabled = false;
      resultBox.innerHTML = "";
      audioPlayer.removeAttribute('src');
      
      const randomIndex = Math.floor(Math.random() * GAME_LIST.length);
      currentAnswer = GAME_LIST[randomIndex];

      try {
        setLoading(true, "ChatGPT가 사운드를 묘사하는 중...");

        // 1. OpenAI Chat Completions API 직접 호출 (텍스트 생성)
        const gptPrompt = `너는 게임 사운드 퀴즈 출제자야. 제시된 게임의 '로그인 창 화면 접속 사운드', '시그니처 배경음악(BGM)', 또는 가장 유명한 '캐릭터 대사나 효과음'을 실감 나게 말로 묘사해 줘. 
        주의할 점:
        1. 절대 게임 이름(${currentAnswer})을 직접적으로 말하면 안 돼.
        2. 음성(TTS)으로 읽힐 테니 소리를 입으로 내는 것처럼 생생하게 설명해 줘. (예: "지이이잉~ 슈우우우우-! 웰컴 투 오버워치!" 같은 느낌)
        3. 답을 맞출 수 있는 힌트 사운드 묘사 문장 딱 2~3줄만 출력해줘.
        
        대상 게임: ${currentAnswer}`;

        const chatResponse = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${OPENAI_API_KEY}`
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini', // 가성비 좋고 빠른 모델 사용
            messages: [{ role: 'user', content: gptPrompt }]
          })
        });

        const chatData = await chatResponse.json();
        if (chatData.error) throw new Error(chatData.error.message);
        const soundDescription = chatData.choices[0].message.content;

        statusBox.textContent = "OpenAI TTS로 목소리 생성 중...";

        // 2. OpenAI Audio Speech API 직접 호출 (TTS 오디오 파일 가져오기)
        const ttsResponse = await fetch('https://api.openai.com/v1/audio/speech', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${OPENAI_API_KEY}`
          },
          body: JSON.stringify({
            model: 'tts-1',
            input: soundDescription,
            voice: 'onyx',
            response_format: 'mp3'
          })
        });

        if (!ttsResponse.ok) {
          const errData = await ttsResponse.json();
          throw new Error(errData.error.message || "TTS 변환 실패");
        }

        // Response 데이터를 Blob 데이터로 변환 후 오디오 재생 주소로 할당
        const audioBlob = await ttsResponse.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        
        audioPlayer.src = audioUrl;
        audioPlayer.play();
        statusBox.textContent = "🔊 사운드가 재생됩니다! 어떤 게임일까요?";

      } catch (error) {
        console.error(error);
        statusBox.textContent = "오류가 발생했습니다: " + error.message;
      } finally {
        setLoading(false, "");
      }
    }

    // 정답 체크 함수
    async function checkAnswer() {
      const userAnswer = answerInput.value.trim();
      if (!userAnswer) {
        alert("정답을 입력해주세요!");
        return;
      }

      answerInput.disabled = true;
      submitBtn.disabled = true;

      const cleanUser = userAnswer.replace(/\s+/g, '').toLowerCase();
      const cleanTarget = currentAnswer.replace(/\s+/g, '').toLowerCase();

      if (cleanUser === cleanTarget) {
        resultBox.innerHTML = `<div class="result-msg correct">🎉 정답입니다! (+10점)</div><p style="color:#bbb">정답: ${currentAnswer}</p>`;
        currentScore += 10;
        scoreDisplay.textContent = currentScore;
        await saveUserScore(currentUser.uid, currentScore);
      } else {
        resultBox.innerHTML = `<div class="result-msg wrong">😢 틀렸습니다!</div><p style="color:#bbb">정답은 [ <b>${currentAnswer}</b> ] 이었습니다.</p>`;
      }
    }

    function setLoading(isLoading, text) {
      nextBtn.disabled = isLoading;
      if (isLoading) statusBox.textContent = text;
    }
  </script>
</head>
<body>

  <div class="container">
    <h1>🎮 AI 사운드 퀴즈</h1>
    <div class="subtitle">접속 소리를 듣고 어떤 게임인지 맞춰보세요!</div>

    <div id="loginSection" style="text-align: center; padding: 40px 0;">
      <p style="color: #e0e0e0; margin-bottom: 20px;">퀴즈를 풀고 점수를 기록하려면 구글 로그인이 필요합니다.</p>
      <button class="auth-btn" id="loginBtn">구글 계정으로 로그인</button>
    </div>

    <div id="quizSection" class="hidden">
      <div class="user-profile">
        <div class="user-info">
          <img id="userAvatar" class="user-avatar" src="" alt="프로필">
          <span id="userName">플레이어</span>
        </div>
        <button class="clear-btn" id="logoutBtn" style="height:32px; padding:0 10px; font-size:12px; background:#555; color:#fff;">로그아웃</button>
      </div>

      <div class="quiz-box">
        <div class="score-board">현재 누적 점수: <span id="scoreDisplay">0</span>점</div>
        
        <div class="audio-section">
          <div style="font-weight: bold; margin-bottom: 8px;">🔊 귀를 기울여 사운드를 들으세요</div>
          <audio id="audioPlayer" controls></audio>
        </div>

        <div style="margin-top: 15px;">
          <input type="text" id="answerInput" placeholder="게임 이름을 입력하세요 (예: 리그 오브 레전드)" />
        </div>

        <div class="button-row">
          <button class="success-btn" id="submitBtn">정답 제출</button>
          <button class="primary-btn" id="nextBtn">다음 문제 불러오기 ➡️</button>
        </div>

        <div id="statusBox" class="status"></div>
        <div id="resultBox"></div>
      </div>
    </div>
  </div>

</body>
</html>
